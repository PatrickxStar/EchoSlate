<div class="bg-white dark:bg-gray-800 shadow-md rounded-lg overflow-hidden">
  <img src="{{ .Params.image }}" alt="{{ .Title }}" class="w-full h-48 object-cover">
  <div class="p-4">
    <h3 class="text-xl font-semibold">{{ .Title }}</h3>
    <p class="text-gray-600 dark:text-gray-400">{{ .Params.description }}</p>
    <a href="{{ .RelPermalink }}" class="text-blue-500 hover:underline mt-2 block">View Resume</a>
  </div>
</div>

<section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
  <h1 class="text-3xl font-extrabold text-gray-900 dark:text-white mb-6">Our Users</h1>

  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
    <!-- Loop through all resumes in the 'resumes' folder -->
    {{ range .Site.GetPage "section" "resumes" }}
      <div class="bg-white dark:bg-gray-800 p-6 rounded-lg shadow">
        <h2 class="text-xl font-bold text-gray-900 dark:text-white">{{ .Title }}</h2>
        <p class="mt-2 text-gray-600 dark:text-gray-400">{{ .Params.description }}</p>
        <a href="{{ .RelPermalink }}" class="text-green-600 hover:text-green-700">View Resume</a>
      </div>
    {{ end }}
  </div>
</section>
